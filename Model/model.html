<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subversion Risk 3D Visual</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-900 overflow-hidden">

    <div id="view-3d-container" class="relative w-full h-screen">
        <canvas id="visualization-canvas" class="w-full h-full block"></canvas>

        <div id="exportContainer" class="absolute top-5 left-1/2 -translate-x-1/2 z-50">
            <button id="exportBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-bold shadow-2xl">
                📥 Export Visible Data
            </button>
        </div>

        <div id="info" class="absolute top-4 left-4 p-4 rounded-lg bg-gray-800/90 border border-gray-700 text-white z-50">
            <h3 class="text-lg font-bold text-indigo-400">Subversion Risk Visual</h3>
            <div class="text-xs text-gray-400 mt-1 space-y-1">
                <p><strong>X-Axis:</strong> Vulnerability Surface</p>
                <p><strong>Y-Axis:</strong> Adversarial Subversion</p>
                <p><strong>Z-Axis:</strong> Risk Score</p>
            </div>
        </div>

        <div id="legend" class="absolute bottom-4 left-4 p-4 rounded-lg bg-gray-800/90 border border-gray-700 text-white z-50">
            <strong id="legend-title" class="text-sm block mb-2 text-gray-400 uppercase tracking-wider">Risk Level</strong>
            <div id="legend-content" class="space-y-2"></div>
        </div>

        <div id="time-slider-panel" class="absolute bottom-8 left-1/2 -translate-x-1/2 p-4 rounded-xl bg-gray-800/95 border border-gray-700 w-80 z-50 shadow-2xl">
            <input type="range" id="time-slider" min="0" max="11" value="11" oninput="handleTimeChange(this.value)" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            <div id="current-date-display" class="text-center text-indigo-400 font-mono font-bold mt-2"></div>
        </div>

        <div id="controls" class="absolute top-4 right-4 w-72 p-4 rounded-lg bg-gray-800/90 border border-gray-700 text-white z-50 max-h-[90vh] overflow-y-auto">
            <h4 class="font-bold text-indigo-400 border-b border-gray-700 pb-2 mb-4">Configuration & Filters</h4>
            
            <div class="mb-4">
                <label class="flex items-center justify-between cursor-pointer">
                    <span class="text-sm">Mitigation View</span>
                    <input type="checkbox" id="mitigation-toggle" class="w-5 h-5 accent-green-500">
                </label>
            </div>

            <div id="axis-controls"></div>
            <div id="severity-filters" class="mt-6"></div>
            <div id="dynamic-filters" class="mt-6"></div>
        </div>
        
        <div id="resetContainer" class="absolute top-1/2 left-0 -translate-y-1/2 z-50">
            <button id="resetBtn" class="bg-gray-700 hover:bg-indigo-600 text-white py-4 px-2 rounded-r-md transition-colors" style="writing-mode: vertical-rl;">
                🔄 RESET VIEW
            </button>
        </div>

        <div id="tooltip" class="fixed p-3 bg-black/90 text-white text-xs rounded border border-gray-600 hidden pointer-events-none z-[100]"></div>
    </div>

    <div id="view-2d-container" class="hidden fixed inset-0 bg-gray-900 z-[60] p-10 overflow-y-auto"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="js/data-processor.js"></script>
    <script src="js/ui-controls.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
