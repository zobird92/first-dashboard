<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Assessment Dashboard | Prototype</title>
    
    <script src="lib/three.min.js"></script>
    <script src="lib/OrbitControls.js"></script>
    <script src="lib/xlsx.full.min.js"></script>
   
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="antialiased">

    <div id="initial-loader" class="fixed inset-0 z-100 flex items-center justify-center bg-[#0a0a0c]">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-indigo-400 font-mono text-sm tracking-widest uppercase">Initializing Engine...</p>
        </div>
    </div>

    <canvas id="visualization-canvas" class="fixed inset-0"></canvas>

    <div id="tooltip" class="fixed hidden pointer-events-none z-50 glass-panel p-3 text-xs shadow-2xl"></div>

    <header class="fixed top-0 left-0 w-full p-6 pointer-events-none flex justify-between items-start z-10">
        <div class="pointer-events-auto">
            <h1 class="text-xl font-black tracking-tighter text-white uppercase italic">Subversion<span class="text-indigo-500">Risk</span>_v1.0</h1>
            <p id="current-date-display" class="text-indigo-400 font-mono text-xs mt-1 italic"></p>
        </div>
        
        <div class="flex gap-2 pointer-events-auto">
            <button id="export-data-btn" class="glass-panel px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-indigo-600/20 transition-all">Export XLSX</button>
            <button id="reset-dashboard-btn" class="glass-panel px-4 py-2 text-xs font-bold uppercase tracking-widest hover:bg-red-600/20 transition-all text-red-400">Reset System</button>
        </div>
    </header>

    <aside class="fixed top-24 left-6 w-72 bottom-24 flex flex-col gap-4 pointer-events-none z-10">
        <div id="axis-controls" class="pointer-events-auto"></div>
        <div id="severity-filters" class="pointer-events-auto"></div>
        <div id="dynamic-filters" class="pointer-events-auto flex-1 overflow-y-auto custom-scrollbar pr-2"></div>
    </aside>

    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 z-10">
        <div class="glass-panel p-4">
            <input type="range" id="time-slider" class="w-full h-1" min="0" value="0">
            <div class="flex justify-between mt-2 text-xs font-black text-gray-500 uppercase tracking-tighter">
                <span>Earliest Quarter</span>
                <span class="text-indigo-400 font-mono">Historical Timeline</span>
                <span>Current State</span>
            </div>
        </div>
    </div>

    <div id="detail-view" class="fixed inset-0 z-60 hidden flex items-center justify-center p-6 bg-[#0a0a0c]/90"></div>

    <div id="error-message" class="fixed bottom-4 right-4 hidden bg-red-900/80 text-red-200 p-4 rounded-lg text-xs z-70 border border-red-500"></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/engine.js"></script>

</body>
</html>
